<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<base href="/music/">
<title>ANALOG ARCHIVIST | Global Archive</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Epilogue:ital,wght@0,400;0,700;0,900;1,400;1,900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#8c5000",
        "on-primary": "#ffffff",
        "primary-container": "#e8963e",
        "secondary": "#516352",
        "surface": "#fcf9f8",
        "on-surface": "#1c1b1b",
        "on-surface-variant": "#534437",
        "surface-container": "#f0eded",
        "surface-container-low": "#f6f3f2",
        "outline": "#867465",
        "outline-variant": "#d8c3b1",
      },
      fontFamily: {
        "headline": ["Epilogue", "sans-serif"],
        "body": ["Space Grotesk", "sans-serif"],
        "label": ["Space Grotesk", "sans-serif"],
      },
      borderRadius: { "DEFAULT": "0px", "lg": "0px", "xl": "0px", "full": "9999px" },
    }
  }
}
</script>
<style>
  * { box-sizing: border-box; }
  body { font-family: 'Space Grotesk', sans-serif; background: #fcf9f8; color: #1c1b1b; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }
  .noise-overlay {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    background-size: 200px;
    opacity: 0.4;
  }
  .crate-card {
    display: flex; flex-direction: column; justify-content: space-between;
    padding: 2rem; border: 1.5px solid #d8c3b1;
    cursor: pointer; position: relative; overflow: hidden;
    text-decoration: none; color: inherit;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    background: #fcf9f8;
  }
  .crate-card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(0,0,0,0.10); }
  .crate-card .accent-bar {
    position: absolute; left: 0; top: 0; bottom: 0; width: 6px;
  }
  .crate-card:hover .accent-bar { width: 10px; }
  .crate-card .count-badge {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: #534437; border: 1px solid #d8c3b1; padding: 2px 8px;
    display: inline-block;
  }
  .halftone {
    background-image: radial-gradient(circle, #8c500015 1px, transparent 1px);
    background-size: 12px 12px;
  }
  .recently-added-strip {
    display: flex;
    gap: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .recently-added-strip::-webkit-scrollbar {
    display: none;
  }
  .ra-card {
    flex: 0 0 220px;
    min-width: 220px;
    position: relative;
    border: 1.5px solid #d8c3b1;
    padding: 12px 12px 12px 18px;
    background: #fcf9f8;
    overflow: hidden;
  }
  .ra-card .ra-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 6px;
  }
  .ra-card .ra-new {
    position: absolute;
    top: 8px; right: 8px;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: #8c5000;
    border: 1px solid #8c5000;
    padding: 2px 5px;
    line-height: 1;
  }
  .ra-card .ra-artist {
    font-family: 'Epilogue', sans-serif;
    font-weight: 900;
    font-size: 14px;
    text-transform: uppercase;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #1c1b1b;
    margin-top: 4px;
    padding-right: 36px; /* clear NEW stamp */
  }
  .ra-card .ra-album {
    font-family: 'Epilogue', sans-serif;
    font-weight: 900;
    font-size: 16px;
    text-transform: uppercase;
    line-height: 1.2;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: #1c1b1b;
    margin-top: 2px;
  }
  .ra-card .ra-year {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    color: #534437;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }
</style>
</head>
<body class="min-h-screen relative">
<div class="noise-overlay"></div>

<!-- Header -->
<header class="relative z-10 border-b border-outline-variant">
  <div class="max-w-7xl mx-auto px-6 py-8">
    <div class="flex items-end justify-between flex-wrap gap-4">
      <div>
        <p class="font-label text-xs tracking-[0.25em] uppercase text-on-surface-variant mb-1">Personal Music Archive</p>
        <h1 class="font-headline font-black text-5xl md:text-7xl tracking-tight uppercase leading-none text-on-surface">
          Analog<br/>Archivist
        </h1>
      </div>
      <div class="text-right">
        <p class="font-headline font-black text-6xl md:text-8xl text-primary leading-none" id="total-count">—</p>
        <p class="font-label text-xs tracking-[0.2em] uppercase text-on-surface-variant">Albums in collection</p>
      </div>
    </div>
  </div>
</header>

<!-- Recently Added -->
<section id="recently-added" class="relative z-10 border-t border-b border-outline-variant" style="background:#f0eded; display:none;">
  <div class="max-w-7xl mx-auto px-6 py-4">
    <p id="recently-added-header" class="font-label text-xs tracking-[0.25em] uppercase text-on-surface-variant mb-3" style="border-left: 3px solid #e8963e; padding-left: 4px;"></p>
    <div id="recently-added-strip" class="recently-added-strip"></div>
  </div>
</section>

<!-- Filter bar -->
<div class="relative z-10 border-b border-outline-variant bg-surface-container-low px-6 py-3 flex items-center gap-3 flex-wrap">
  <span class="font-label text-xs tracking-[0.2em] uppercase text-on-surface-variant mr-2">Collections</span>
  <span class="font-label text-xs tracking-[0.15em] uppercase text-on-surface-variant border border-outline-variant px-3 py-1 halftone">8 crates · Select to enter</span>
</div>

<!-- Crate Grid -->
<main class="relative z-10 max-w-7xl mx-auto px-6 py-10">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="crate-grid">
    <!-- injected by JS -->
  </div>
  <p class="font-label text-xs text-on-surface-variant mt-8 border-t border-outline-variant pt-4 tracking-wide">
    Each crate is a curated listening context. Click to enter the archive.
  </p>
</main>

<script src="data.js"></script>
<script src="basket.js"></script>
<script>
const CRATES = [
  { tag: 'dive-bar',     name: 'Dive Bar Glow',           file: 'dive-bar.html',     accent: '#ff6a9f', desc: 'Late-night sessions, neon-soaked dives' },
  { tag: 'marine-drive', name: 'Marine Drive',             file: 'marine-drive.html', accent: '#3a9bbd', desc: 'Coastal drives, open roads, clean air' },
  { tag: 'weekender',    name: 'The Weekender',            file: 'weekender.html',    accent: '#ff833f', desc: 'Festival energy, chromatic pulse' },
  { tag: 'trek',         name: 'Trek: High Peaks',         file: 'trek.html',         accent: '#4c7c4c', desc: 'Trails, altitude, open horizons' },
  { tag: 'band-practice',name: 'Band Practice',            file: 'band-practice.html',accent: '#c24b4b', desc: 'Raw, loud, distressed — the noise archive' },
  { tag: 'studying',     name: 'Study: Deep Focus',        file: 'study.html',        accent: '#5a7fa0', desc: 'Grayscale concentration, zero distraction' },
  { tag: 'blue-frog',    name: 'Blue Frog',                file: 'blue-frog.html',    accent: '#00c8e8', desc: 'Sonic architecture, neon Mumbai nights' },
  { tag: '',             name: 'The Vault',                file: 'vault.html',        accent: '#a09080', desc: 'Unclassified — the full uncategorized archive' },
];

const counts = {};
let total = 0;
for (const a of MUSIC_LIBRARY) {
  const k = a.tag || '';
  counts[k] = (counts[k] || 0) + 1;
  total++;
}

// Recently Added shelf
(function() {
  const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  const maxDate = MUSIC_LIBRARY.reduce(
    (max, a) => (a.date_added > max ? a.date_added : max), ''
  );
  if (!maxDate) return; // all legacy — keep section hidden

  const recentAlbums = MUSIC_LIBRARY.filter(a => a.date_added === maxDate);
  const section = document.getElementById('recently-added');
  const header  = document.getElementById('recently-added-header');
  const strip   = document.getElementById('recently-added-strip');

  const [yyyy, mm, dd] = maxDate.split('-');
  const dateLabel = `${dd}/${mm}/${yyyy}`;
  header.textContent = `Recently Added · ${recentAlbums.length} album${recentAlbums.length === 1 ? '' : 's'} · ${dateLabel}`;

  recentAlbums.forEach(album => {
    const crate  = CRATES.find(c => c.tag === album.tag);
    const accent = crate ? crate.accent : '#8c5000';

    const card = document.createElement('div');
    card.className = 'ra-card';
    card.innerHTML = `
      <div class="ra-accent" style="background:${accent}"></div>
      <span class="ra-new">New</span>
      <div class="ra-artist">${esc(album.artist)}</div>
      <div class="ra-album">${esc(album.album)}</div>
      <div class="ra-year">${esc(album.year || '—')}</div>
    `;
    strip.appendChild(card);
  });

  section.style.display = '';
})();

document.getElementById('total-count').textContent = total.toLocaleString();

const grid = document.getElementById('crate-grid');
CRATES.forEach(crate => {
  const n = counts[crate.tag] || 0;
  const card = document.createElement('a');
  card.href = crate.file;
  card.className = 'crate-card';
  card.innerHTML = `
    <div class="accent-bar" style="background:${crate.accent}; transition: width 0.15s ease;"></div>
    <div class="pl-4">
      <div class="flex items-center justify-between mb-6">
        <span class="count-badge">${n} albums</span>
        <span class="material-symbols-outlined text-outline" style="font-size:18px">arrow_outward</span>
      </div>
      <h2 class="font-headline font-black text-2xl md:text-3xl uppercase leading-tight mb-3 text-on-surface">${crate.name}</h2>
      <p class="font-body text-sm text-on-surface-variant leading-relaxed">${crate.desc}</p>
    </div>
    <div class="pl-4 mt-6 pt-4 border-t border-outline-variant flex items-center gap-2">
      <div class="w-2 h-2 rounded-full" style="background:${crate.accent}"></div>
      <span class="font-label text-xs tracking-[0.12em] uppercase text-on-surface-variant">${crate.tag || 'untagged'}</span>
    </div>
  `;
  grid.appendChild(card);
});
</script>
</body>
</html>
