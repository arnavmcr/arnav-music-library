<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<base href="/music/">
<title>Trek: High Peaks | Analog Archivist</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;1,300;1,400&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --green: #061b0e;
    --green-mid: #1b3022;
    --green-accent: #2e6b45;
    --cyan: #006399;
    --surface: #f7f9fb;
    --surface-hi: #eef1f4;
    --on-surface: #0d1f18;
    --muted: #6a8070;
    --border: #c8d5cd;
  }
  * { box-sizing: border-box; }
  body {
    background: var(--surface); color: var(--on-surface);
    font-family: 'Work Sans', sans-serif; min-height: 100vh;
  }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24; display: inline-block; vertical-align: middle; }

  /* Topographic dot grid */
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image: radial-gradient(circle, #061b0e22 1px, transparent 1px);
    background-size: 28px 28px;
  }

  header { border-bottom: 1px solid var(--border); background: rgba(247,249,251,0.95); backdrop-filter: blur(8px); position: relative; z-index: 10; }

  .album-card {
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    transition: border-color 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .album-card:hover {
    border-color: var(--green-accent);
    box-shadow: 0 4px 24px rgba(6,27,14,0.08);
  }
  .card-body { padding: 1.5rem; }
  .artist {
    font-family: 'Newsreader', serif;
    font-weight: 300; font-style: italic;
    font-size: clamp(1.1rem, 2.5vw, 1.55rem);
    color: var(--green); line-height: 1.15;
    letter-spacing: -0.01em;
  }
  .album-title {
    font-family: 'Work Sans', sans-serif;
    font-weight: 400; font-size: 0.85rem;
    color: var(--on-surface); margin-top: 0.25rem;
    letter-spacing: 0.01em;
  }
  .meta {
    font-size: 0.67rem; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--muted); margin-top: 0.8rem;
    display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap;
  }
  .count-badge {
    position: absolute; top: 1rem; right: 1rem;
    font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em;
    text-transform: uppercase; color: var(--muted);
    border: 1px solid var(--border); padding: 2px 6px;
    font-family: 'Work Sans', sans-serif;
  }
  .expand-btn {
    display: flex; align-items: center; gap: 4px;
    font-size: 0.65rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--cyan); cursor: pointer; border: none; background: none;
    padding: 0; margin-top: 0.9rem; font-family: 'Work Sans', sans-serif; font-weight: 600;
  }
  .expand-btn .arrow { transition: transform 0.2s; }
  .album-card.open .expand-btn .arrow { transform: rotate(180deg); }
  .tracklist {
    display: none; background: var(--surface-hi);
    border-top: 2px solid var(--green-accent); padding: 1rem 1.5rem;
  }
  .album-card.open .tracklist { display: block; }
  .track-row {
    display: flex; gap: 1rem; align-items: baseline;
    padding: 0.32rem 0; border-bottom: 1px solid var(--border);
    font-size: 0.78rem;
  }
  .track-row:last-child { border-bottom: none; }
  .track-num { color: var(--green-accent); font-weight: 700; min-width: 1.8rem; }
  .track-title { color: var(--on-surface); flex: 1; }
  .track-dur { color: var(--muted); font-size: 0.7rem; font-variant-numeric: tabular-nums; }
  .no-tracks { color: var(--muted); font-size: 0.8rem; font-style: italic; }

  /* Altitude strip */
  .trek-alt-strip {
    position: fixed; right: 1.5rem; top: 50%; transform: translateY(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    z-index: 100; pointer-events: none;
  }
  @media (max-width: 640px) { .trek-alt-strip { display: none; } }

  .trek-alt-label {
    font-size: 0.55rem; letter-spacing: 0.28em; text-transform: uppercase;
    color: var(--green-mid); writing-mode: vertical-lr; font-family: 'Work Sans', sans-serif;
    font-weight: 500;
  }

  .trek-alt-track {
    position: relative; width: 2px; height: 200px;
    background: var(--border);
  }

  .trek-alt-tick {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 6px; height: 1px; background: var(--green-mid); opacity: 0.4;
  }

  .trek-alt-marker {
    position: absolute; left: 50%; transform: translateX(-50%);
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--green-accent);
    box-shadow: 0 0 14px 3px rgba(46,107,69,0.55);
    transition: background 0.5s ease, box-shadow 0.5s ease;
    top: 0;
  }

  .trek-alt-number {
    font-size: 0.7rem; letter-spacing: 0.08em; font-family: 'Work Sans', sans-serif;
    font-weight: 500; color: var(--muted); font-variant-numeric: tabular-nums;
    transition: color 0.5s ease;
  }

  .trek-alt-flag {
    font-size: 0.85rem; opacity: 0; transition: opacity 0.5s ease;
  }
  .trek-alt-flag.visible { opacity: 1; }
</style>
</head>
<body>

<!-- Portfolio nav -->
<nav style="position:sticky;top:0;z-index:100;background:rgba(252,249,248,0.97);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid #d8c3b1;padding:0 1.5rem;height:36px;display:flex;align-items:center;gap:1.25rem;">
  <a href="/" style="font-family:'Epilogue',sans-serif;font-weight:900;font-style:italic;font-size:0.72rem;letter-spacing:-0.02em;color:#1c1b1b;text-decoration:none;white-space:nowrap;">OH MESSY LIFE</a>
  <div style="width:1px;height:1.25rem;background:#d8c3b1;flex-shrink:0;"></div>
  <div style="display:flex;gap:1.25rem;align-items:center;">
    <a href="/writing" style="font-family:'Space Grotesk',sans-serif;font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:#534437;text-decoration:none;opacity:0.6;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">Writing</a>
    <a href="/record" style="font-family:'Space Grotesk',sans-serif;font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:#534437;text-decoration:none;opacity:0.6;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">Record</a>
    <a href="/music" style="font-family:'Space Grotesk',sans-serif;font-size:0.58rem;letter-spacing:0.18em;text-transform:uppercase;font-weight:700;color:#8c5000;text-decoration:none;border-bottom:1.5px solid #8c5000;padding-bottom:1px;">Signal</a>
  </div>
</nav>

<header>
  <div style="max-width:1400px;margin:0 auto;padding:1.25rem 1.5rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;">
    <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;text-decoration:none;color:var(--muted);font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;font-family:'Work Sans',sans-serif;">
      <span class="material-symbols-outlined" style="font-size:16px">arrow_back</span>
      Global Archive
    </a>
    <div style="text-align:center;">
      <div style="font-family:'Newsreader',serif;font-style:italic;font-weight:300;font-size:1.6rem;color:var(--green);letter-spacing:-0.01em;">Trek</div>
      <div style="font-size:0.65rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);">The High Peaks Archive</div>
    </div>
    <div style="text-align:right;">
      <div style="font-family:'Newsreader',serif;font-style:italic;font-weight:300;font-size:1.8rem;color:var(--green-accent);line-height:1;" id="count-display">—</div>
      <div style="font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted);">Albums</div>
    </div>
  </div>
</header>

<div style="max-width:1400px;margin:0 auto;padding:0.75rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:1rem;flex-wrap:wrap;position:relative;z-index:10;background:rgba(247,249,251,0.95);">
  <span style="font-size:0.6rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--green-accent);border:1px solid var(--green-accent);padding:2px 8px;">trek</span>
  <input id="search" type="text" placeholder="Search artist or album…" style="background:var(--surface-hi);border:1px solid var(--border);color:var(--on-surface);padding:0.4rem 0.75rem;font-size:0.8rem;font-family:'Work Sans',sans-serif;outline:none;flex:1;max-width:320px;" oninput="renderAlbums()"/>
  <div style="margin-left:auto;display:flex;gap:0.5rem;align-items:center;">
    <label style="font-size:0.7rem;color:var(--muted);letter-spacing:0.1em;text-transform:uppercase;">Sort</label>
    <select id="sort" onchange="renderAlbums()" style="background:var(--surface-hi);border:1px solid var(--border);color:var(--on-surface);padding:0.35rem 0.5rem;font-size:0.75rem;font-family:'Work Sans',sans-serif;outline:none;">
      <option value="artist">Artist A→Z</option>
      <option value="year-desc">Year (newest)</option>
      <option value="year-asc">Year (oldest)</option>
      <option value="album">Album A→Z</option>
    </select>
  </div>
</div>

<main style="max-width:1400px;margin:0 auto;padding:2rem 1.5rem;position:relative;z-index:10;">
  <div id="album-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px;">
  </div>
  <div id="empty-msg" style="display:none;padding:4rem;text-align:center;color:var(--muted);font-size:0.9rem;font-style:italic;">No albums found.</div>
</main>

<div class="trek-alt-strip" id="trek-alt">
  <span class="trek-alt-flag" id="trek-flag">⛳</span>
  <span class="trek-alt-label">Altitude Profile</span>
  <div class="trek-alt-track" id="trek-track">
    <div class="trek-alt-tick" style="top:25%"></div>
    <div class="trek-alt-tick" style="top:50%"></div>
    <div class="trek-alt-tick" style="top:75%"></div>
    <div class="trek-alt-marker" id="trek-marker"></div>
  </div>
  <span class="trek-alt-number" id="trek-number">0m</span>
</div>

<script src="data.js"></script>
<script src="basket.js"></script>
<script>
const TAG = 'trek';
let albums = MUSIC_LIBRARY.filter(a => a.tag === TAG);

function sorted(arr) {
  const s = document.getElementById('sort').value;
  const q = (document.getElementById('search').value || '').toLowerCase();
  let res = q ? arr.filter(a => a.artist.toLowerCase().includes(q) || a.album.toLowerCase().includes(q)) : arr;
  if (s === 'artist') res = [...res].sort((a,b) => a.artist.localeCompare(b.artist));
  else if (s === 'year-desc') res = [...res].sort((a,b) => (b.year||0)-(a.year||0));
  else if (s === 'year-asc') res = [...res].sort((a,b) => (a.year||0)-(b.year||0));
  else if (s === 'album') res = [...res].sort((a,b) => a.album.localeCompare(b.album));
  return res;
}

function escAttr(s) {
  return String(s).replace(/&/g, '&amp;').replace(/"/g, '&quot;');
}

function makeCard(a) {
  const div = document.createElement('div');
  div.className = 'album-card';
  div.dataset.id = a.id;
  const tracks = a.tracks || [];
  const trackHTML = tracks.length
    ? tracks.map(t => `<div class="track-row"><span class="track-num">${String(t.number).padStart(2,'0')}</span><span class="track-title">${t.title}</span><span class="track-dur">${t.duration||''}</span></div>`).join('')
    : '<p class="no-tracks">Track data unavailable</p>';
  const inBasket = typeof basketIsBagged === 'function' && basketIsBagged(a.id);
  const albumData = escAttr(JSON.stringify({ id: a.id, artist: a.artist, album: a.album, year: a.year || '' }));
  div.innerHTML = `
    <span class="count-badge">${tracks.length}T</span>
    <div class="card-body">
      <div class="artist">${a.artist}</div>
      <div class="album-title">${a.album}</div>
      <div class="meta">
        <span>${a.year||'—'}</span>
        <span>·</span>
        <span>${a.genre||'—'}</span>
        <span>·</span>
        <span>${a.format||'—'}</span>
      </div>
      <button class="expand-btn" onclick="toggleCard(this.closest('.album-card'))">
        <span class="material-symbols-outlined arrow" style="font-size:14px">expand_more</span>
        ${tracks.length} track${tracks.length!==1?'s':''}
      </button>
      <button class="crate-btn${inBasket ? ' crate-btn--in' : ''}" onclick="basketToggle(${albumData})" data-id="${escAttr(a.id)}">${inBasket ? '✓ In crate' : '+ Crate'}</button>
    </div>
    <div class="tracklist">${trackHTML}</div>
  `;
  return div;
}

function toggleCard(card) { card.classList.toggle('open'); }

function renderAlbums() {
  const grid = document.getElementById('album-grid');
  const empty = document.getElementById('empty-msg');
  const res = sorted(albums);
  document.getElementById('count-display').textContent = res.length;
  grid.innerHTML = '';
  if (!res.length) { empty.style.display='block'; return; }
  empty.style.display = 'none';
  res.forEach(a => grid.appendChild(makeCard(a)));
}

renderAlbums();

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    document.querySelectorAll('.album-card.open').forEach(c => toggleCard(c));
  }
  if (e.key === '/' && !['INPUT','TEXTAREA'].includes(document.activeElement.tagName)) {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

(function() {
  const MAX_ALT = 4200;
  const SUMMIT_THRESHOLD = 0.92;
  const LERP_SPEED = 0.07; // resistance — lower = more lag

  const STOPS = [
    [0,    46, 107,  69],
    [0.5, 106, 128, 112],
    [1.0, 200, 213, 205],
  ];

  function lerpColour(t) {
    let i = 0;
    while (i < STOPS.length - 2 && t > STOPS[i+1][0]) i++;
    const [t0, r0, g0, b0] = STOPS[i];
    const [t1, r1, g1, b1] = STOPS[i+1];
    const f = (t - t0) / (t1 - t0);
    return [
      Math.round(r0 + f * (r1 - r0)),
      Math.round(g0 + f * (g1 - g0)),
      Math.round(b0 + f * (b1 - b0)),
    ];
  }

  function formatAlt(m) {
    return m >= 1000
      ? Math.floor(m/1000) + ',' + String(m % 1000).padStart(3,'0') + 'm'
      : m + 'm';
  }

  const marker = document.getElementById('trek-marker');
  const number = document.getElementById('trek-number');
  const flag   = document.getElementById('trek-flag');
  const track  = document.getElementById('trek-track');

  let targetT = 0;
  let displayT = 0;

  function getScrollT() {
    const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
    return maxScroll > 0 ? Math.min((window.scrollY || 0) / maxScroll, 1) : 0;
  }

  function render() {
    const trackH = track.offsetHeight;
    const markerSize = 12;
    marker.style.top = ((1 - displayT) * (trackH - markerSize)).toFixed(2) + 'px';

    const alt = Math.round(displayT * MAX_ALT);
    number.textContent = formatAlt(alt);

    const [r, g, b] = lerpColour(displayT);
    const col = `rgb(${r},${g},${b})`;
    marker.style.background = col;
    marker.style.boxShadow = `0 0 14px 3px rgba(${r},${g},${b},0.55)`;
    number.style.color = col;

    flag.classList.toggle('visible', displayT >= SUMMIT_THRESHOLD);
  }

  function loop() {
    targetT = getScrollT();
    displayT += (targetT - displayT) * LERP_SPEED;
    render();
    requestAnimationFrame(loop);
  }

  const origRender = window.renderAlbums;
  window.renderAlbums = function() { origRender(); targetT = getScrollT(); };
  loop();
})();
</script>
</body>
</html>
